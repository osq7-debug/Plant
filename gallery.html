<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/gallery.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <header id="header-placeholder"></header>       
    <script src="/js/header.js"></script>
 
    <section class="gallery-hero">
        <h1>Natural Alternatives<br>from Dye Plants</h1>
        <p>This section presents carefully selected images that highlight the versatility and practicality of the dye plants in the catalogue.</p>
        <a href="/login.html" class="admin-btn">Are You Admin? Login Here</a>

    <select id="color-filter" onchange="filterByColor()">
        <option value="all">All colors</option>
        <option value="yellow">Yellow</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="purple">Purple</option>
        <option value="brown">Brown</option>
        <option value="orange">Orange</option>
        <option value="pink">Pink</option>
    </select>

    <select id="material-filter" onchange="filterByMaterial()">
        <option value="all">All materials</option>
        <option value="wool">Wool</option>
        <option value="cotton">Cotton</option>
        <option value="linen">Linen</option>
        <option value="silk">Silk</option>
    </select>

    <button onclick="resetFilters()" id="resetFilterBtn">Reset filters</button>
    <p id="kasvi-maara"></p>
    </section>

    <!-- GALLERia -->
    <section class="gallery-section">
        <div class="gallery-grid" id="gallery-grid">
            <!-- Kasvikortit lisätään JavaScriptillä -->
        </div>
    </section>

    

    <script src="js/gallery.js"></script>

</section>
</body>
</html>
